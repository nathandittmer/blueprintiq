project:
  name: blueprintiq
  run_dir: runs
  seed: 1337

mlflow:
  enabled: true
  tracking_uri: ""
  experiment_name: blueprintiq-dev

data_gen:
  output_dir: data/synth
  n_samples: 10
  image_size: [2200, 1700]

data_gen:
  output_dir: data/synth_v0
  n_samples: 10
  image_size: [2200,1700]
  seed: 1337

training:
  batch_size: 2
  learning_rate: 0.005
  momentum: 0.9
  weight_decay: 0.005
  max_steps_per_epoch: 5
  checkpoint_dir: runs/checkpoints
  checkpoint_name: detector_v0.pt
  num_epochs: 3

eval:
  n_eval_samples: 5
  score_threshold: 0.2
  match_iou_threshold: 0.5

model:
  version: "v0.1"
  description: "faster_rcnn_title_block_detector"